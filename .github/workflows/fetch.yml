name: Fetch ManyBooks Categories

on:
  schedule:
    # Run every 7 days (Monday 03:00 UTC) — mirrors the NYT cache cadence
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml playwright

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Fetch category lists
        env:
          MB_COOKIE: ${{ secrets.MB_COOKIE }}
        run: python3 fetch_manybooks.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A mb/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ManyBooks cache $(date -u +%Y-%m-%d)"
            git push
          fi

  deploy:
    needs: fetch
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
